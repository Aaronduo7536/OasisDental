<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oasis Dental – Mockups</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }
    p.subtitle {
      color: #666;
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }
    .cards {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a.card {
      text-decoration: none;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      text-align: center;
      color: #1a1a2e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
      min-width: 160px;
    }
    a.card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    a.card .num {
      font-size: 2.2rem;
      font-weight: 700;
      color: #3b82f6;
      margin-bottom: 0.5rem;
    }
    a.card .label {
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Oasis Dental</h1>
  <p class="subtitle">Design Mockups — select a page to preview</p>
  <div class="cards">
    <a class="card" href="index1.html">
      <div class="num">1</div>
      <div class="label">Mockup 1</div>
    </a>
    <a class="card" href="index2.html">
      <div class="num">2</div>
      <div class="label">Mockup 2</div>
    </a>
    <a class="card" href="index3.html">
      <div class="num">3</div>
      <div class="label">Mockup 3</div>
    </a>
  </div>
</body>
</html>
